<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda - Mundo Fútbol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cookie-banner" class="cookie-overlay">
        <div class="cookie-box">
            <p>Utilizamos cookies para mejorar su experiencia futbolística. ¿Aceptas?</p>
            <button onclick="acceptCookies()">Aceptar</button>
        </div>
    </div>

    <header>
        <div class="container">
            <h1 class="logo" onclick="location.href='index.html'" style="cursor:pointer">Mundo Fútbol</h1>
            <nav>
                <ul>
                    <li><a href="carrito.html">Carrito (<span id="cart-count">0</span>)</a></li>
                    <li><a href="index.html">Tienda</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h2 class="page-title">Tienda</h2>
        <section class="products-grid">
            <div class="product-card">
                <img src="arespro.jpg">
                <h3>Fichaje Arespro Getafe</h3>
                <p class="price">15.00 €</p>
                <button class="btn-add" onclick="addToCart('Fichaje Arespro Getafe', 15.00, 'arespro.jpg')">Añadir al carrito</button>
            </div>
            <div class="product-card">
                <img src="tung.jpg">
                <h3>Fichaje Tung</h3>
                <p class="price">33.00 €</p>
                <button class="btn-add" onclick="addToCart('Fichaje Tung', 33.00, 'tung.jpg')">Añadir al carrito</button>
            </div>
            <div class="product-card">
                <img src="cadiz.jpg">
                <h3>Poster fichaje Cádiz</h3>
                <p class="price">10.67 €</p>
                <button class="btn-add" onclick="addToCart('Poster fichaje Cádiz', 10.67, 'cadiz.jpg')">Añadir al carrito</button>
            </div>
        </section>
    </main>

    <script>
        function addToCart(name, price, img) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push({name, price, img});
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCount();
            alert("¡Producto añadido!");
        }

        function updateCount() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').innerText = cart.length;
        }

        function acceptCookies() {
            document.getElementById('cookie-banner').style.display = 'none';
            localStorage.setItem('cookiesAccepted', 'true');
        }

        window.onload = () => {
            updateCount();
            if(localStorage.getItem('cookiesAccepted')) document.getElementById('cookie-banner').style.display = 'none';
        }
    </script>
</body>
</html>
